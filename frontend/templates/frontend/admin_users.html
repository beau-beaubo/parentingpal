{% extends "frontend/app_shell.html" %}

{% block content %}
  <div class="rounded-3xl bg-white/70 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">Admin • Users</h1>
        <div class="mt-1 text-sm text-slate-600">Create / update / delete users</div>
      </div>
      <button type="button" data-open-modal="admin-user-create" class="rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-300">
        Create user
      </button>
    </div>
  </div>

  <section class="mt-6 rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-center justify-between gap-4">
      <h2 class="text-lg font-semibold">Users</h2>
      <button type="button" id="adminUsersLoad" class="rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300">Load</button>
    </div>
    <div class="mt-4" id="adminUsersList">
      <div class="text-sm text-slate-600">Click “Load” to show users.</div>
    </div>
  </section>

  <div class="fixed inset-0 z-50 hidden" data-modal="admin-user-create">
    <div class="absolute inset-0 bg-black/40" data-close-modal="admin-user-create"></div>
    <div class="absolute inset-x-0 top-10 mx-auto w-full max-w-xl px-4">
      <div class="rounded-3xl bg-white shadow-xl ring-1 ring-slate-200">
        <div class="flex items-start justify-between gap-4 border-b border-slate-100 p-5">
          <div>
            <div class="text-lg font-semibold text-slate-900">Create user</div>
            <div class="mt-1 text-xs text-slate-500">Admin can create users here.</div>
          </div>
          <button type="button" class="rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300" data-close-modal="admin-user-create">Close</button>
        </div>

        <div class="p-5">
          <form id="adminUserCreateForm" class="space-y-3">
            <div>
              <label class="block text-sm font-medium text-slate-700" for="auEmail">Email</label>
              <input id="auEmail" type="email" required class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700" for="auName">Full name</label>
              <input id="auName" type="text" required class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700" for="auRole">Role</label>
              <select id="auRole" class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <option value="teacher">teacher</option>
                <option value="admin">admin</option>
                <option value="parent">parent</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700" for="auPassword">Password (optional)</label>
              <input id="auPassword" type="password" class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
              <div class="mt-1 text-xs text-slate-500">If blank, user gets an unusable password.</div>
            </div>
            <button type="submit" class="w-full rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-300">Create</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
