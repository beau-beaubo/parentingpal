<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parenting Pal — Parent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/frontend/app.js" defer></script>
  </head>
  <body data-page="parent" class="min-h-screen bg-gradient-to-br from-amber-50 via-indigo-50 to-emerald-50 text-slate-900">
    <div class="mx-auto max-w-6xl px-6 py-10">
      <div class="rounded-2xl bg-white/70 backdrop-blur border border-white shadow-sm p-6">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Parent Dashboard</h1>
            <div id="me" class="mt-1 text-sm text-slate-600"></div>
          </div>
          <button id="logout" type="button"
            class="inline-flex items-center justify-center rounded-xl bg-white px-4 py-2 font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-400">
            Logout
          </button>
        </div>
      </div>

      <div id="msg" class="mt-4 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-rose-800" hidden></div>

      <div class="mt-6 grid gap-6 lg:grid-cols-3">
        <div class="lg:col-span-2 space-y-6">
          <div class="rounded-2xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
            <div class="flex items-center justify-between gap-4">
              <h2 class="text-lg font-semibold">Homework To‑Do</h2>
              <span class="text-xs font-medium text-slate-600">Assigned → Submitted</span>
            </div>
            <div class="mt-4" id="homeworkTodos"></div>
          </div>

          <div class="rounded-2xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
            <h2 class="text-lg font-semibold">Announcements</h2>
            <div class="mt-4" id="announcements"></div>
          </div>
        </div>

        <div class="space-y-6">
          <div class="rounded-2xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
            <h2 class="text-lg font-semibold">My To‑Dos</h2>

            <form id="todoCreateForm" class="mt-4 space-y-3">
              <div>
                <label for="todoText" class="block text-sm font-medium text-slate-700">New To‑Do</label>
                <input id="todoText" type="text" placeholder="Buy pencils"
                  class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
              </div>
              <button type="submit"
                class="w-full rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                Add
              </button>
            </form>

            <div class="mt-4" id="manualTodos"></div>
          </div>

          <div class="rounded-2xl bg-white/60 backdrop-blur border border-white shadow-sm p-5 text-sm text-slate-600">
            This page uses JWT auth from <code class="rounded bg-slate-100 px-1.5 py-0.5">/api/auth/token/</code> and calls only parent endpoints.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
