{% extends "frontend/app_shell.html" %}

{% block content %}
  <div class="rounded-3xl bg-white/70 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">Admin • Students</h1>
        <div class="mt-1 text-sm text-slate-600">Create / update / delete students</div>
      </div>
      <button type="button" data-open-modal="admin-student-create" class="rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-300">
        Create student
      </button>
    </div>
  </div>

  <section class="mt-6 rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-center justify-between gap-4">
      <h2 class="text-lg font-semibold">Students</h2>
      <button type="button" id="adminStudentsLoad" class="rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300">Load</button>
    </div>
    <div class="mt-4 grid gap-3 sm:grid-cols-2">
      <div>
        <label class="block text-sm font-medium text-slate-700" for="adminStudentFilterClass">Filter by class</label>
        <select id="adminStudentFilterClass" class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
      </div>
      <div class="sm:pt-6">
        <div class="text-xs text-slate-500">Choose a class to auto-reload (or click Load).</div>
      </div>
    </div>
    <div class="mt-4" id="adminStudentsList">
      <div class="text-sm text-slate-600">Click “Load” to show students.</div>
    </div>
  </section>

  <div class="fixed inset-0 z-50 hidden" data-modal="admin-student-create">
    <div class="absolute inset-0 bg-black/40" data-close-modal="admin-student-create"></div>
    <div class="absolute inset-x-0 top-10 mx-auto w-full max-w-xl px-4">
      <div class="rounded-3xl bg-white shadow-xl ring-1 ring-slate-200">
        <div class="flex items-start justify-between gap-4 border-b border-slate-100 p-5">
          <div>
            <div class="text-lg font-semibold text-slate-900">Create student</div>
            <div class="mt-1 text-xs text-slate-500">Add a student and assign them to a class.</div>
          </div>
          <button type="button" class="rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300" data-close-modal="admin-student-create">Close</button>
        </div>

        <div class="p-5">
          <form id="adminStudentCreateForm" class="space-y-3">
            <div>
              <label class="block text-sm font-medium text-slate-700" for="asName">Student full name</label>
              <input id="asName" type="text" required class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700" for="asClass">Class</label>
              <select id="asClass" class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
            </div>
            <button type="submit" class="w-full rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-300">Create</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
