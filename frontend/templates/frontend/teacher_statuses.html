{% extends "frontend/app_shell.html" %}

{% block content %}
  <div class="rounded-3xl bg-white/70 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">Homework Statuses</h1>
        <div class="mt-1 text-sm text-slate-600">Assigned → Submitted → Checked</div>
      </div>
      <a href="/app/teacher/homework/" class="inline-flex items-center justify-center rounded-xl bg-white px-4 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        Go to Homework
      </a>
    </div>
  </div>

  <section class="mt-6 rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-center justify-between gap-4">
      <h2 class="text-lg font-semibold">Class</h2>
      <div class="text-sm text-slate-600">Pick a class to view statuses</div>
    </div>
    <label for="classSelect" class="mt-4 block text-sm font-medium text-slate-700">Select class</label>
    <select id="classSelect" class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"></select>
  </section>

  <section class="mt-6 rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-center justify-between gap-4">
      <h2 class="text-lg font-semibold">Homework</h2>
      <span class="text-xs font-medium text-slate-600">Click “View Statuses”</span>
    </div>
    <div class="mt-4" id="teacherHomework"></div>
  </section>
{% endblock %}
