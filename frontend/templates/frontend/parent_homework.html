{% extends "frontend/app_shell.html" %}

{% block content %}
  <div class="rounded-3xl bg-white/70 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">Homework</h1>
        <div class="mt-1 text-sm text-slate-600">Assigned → Submitted</div>
      </div>
      <a href="/app/parent/" class="inline-flex items-center justify-center rounded-xl bg-white px-4 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-400">Home</a>
    </div>
  </div>

  <section class="mt-6 rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
    <div id="homeworkTodos"></div>
  </section>

  <section class="mt-6 rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="text-lg font-semibold tracking-tight">Submission History</h2>
        <div class="mt-1 text-sm text-slate-600">Shows your recent “Mark Submitted” actions.</div>
      </div>
    </div>
    <div class="mt-4" id="submissionHistory"></div>
  </section>
{% endblock %}
