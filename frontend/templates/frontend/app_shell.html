<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page_title %}{{ page_title }}{% else %}Parenting Pal{% endif %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/frontend/app.js" defer></script>
  </head>

  <body data-page="{{ data_page|default:'' }}" class="min-h-screen bg-gradient-to-br from-pink-50 via-sky-50 to-indigo-50 text-slate-900">
    <div class="min-h-screen lg:flex">
      <!-- Sidebar (desktop) -->
      <aside class="hidden lg:flex lg:w-72 lg:flex-col lg:bg-white/70 lg:backdrop-blur lg:border-r lg:border-white lg:shadow-sm">
        <div class="px-6 py-6">
          <div class="text-lg font-semibold tracking-tight">Parenting Pal</div>
        </div>
        <nav class="px-3 pb-6">
          <div class="space-y-1">
            {% for item in nav_items %}
              <a href="{{ item.href }}"
                 class="flex items-center justify-between rounded-xl px-4 py-3 text-sm font-semibold transition
                        {% if nav_active == item.key %}
                          bg-gradient-to-r from-pink-200 to-sky-200 text-slate-900 ring-1 ring-white
                        {% else %}
                          text-slate-700 hover:bg-white
                        {% endif %}">
                <span>{{ item.label }}</span>
              </a>
            {% endfor %}
          </div>
        </nav>

        <div class="mt-auto px-6 pb-6">
          <button id="logoutDesktop" type="button" class="w-full rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300">
            Logout
          </button>
        </div>
      </aside>

      <!-- Content area -->
      <div class="flex min-h-screen flex-1 flex-col">
        <!-- Top bar -->
        <header class="bg-gradient-to-r from-pink-400 to-sky-400 text-white shadow-sm">
          <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
            <div class="flex items-center gap-3">
              <button id="menuBtn" type="button" class="inline-flex items-center justify-center rounded-lg bg-white/25 px-3 py-2 text-sm font-semibold text-white hover:bg-white/30 focus:outline-none focus:ring-2 focus:ring-white/60 lg:hidden">
                Menu
              </button>
              <div class="text-sm font-semibold">Parenting Pal</div>
            </div>
            <button id="logout" type="button" class="rounded-lg bg-white/25 px-3 py-2 text-sm font-semibold text-white hover:bg-white/30 focus:outline-none focus:ring-2 focus:ring-white/60 lg:hidden">
              Logout
            </button>
          </div>
        </header>

        <main class="mx-auto w-full max-w-7xl flex-1 px-4 py-6 sm:px-6">
          <div id="msg" class="mb-4" hidden></div>
          {% block content %}{% endblock %}
        </main>

        <footer class="border-t border-slate-200 bg-white">
          <div class="mx-auto max-w-7xl px-4 py-3 text-xs text-slate-500 sm:px-6">Parenting Pal</div>
        </footer>
      </div>

      <!-- Mobile drawer -->
      <div id="overlay" class="fixed inset-0 z-40 hidden bg-black/40 lg:hidden"></div>
      <div id="drawer" class="fixed inset-y-0 left-0 z-50 hidden w-80 max-w-[85%] bg-white shadow-xl lg:hidden">
        <div class="p-5">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-lg font-semibold tracking-tight">Menu</div>
              <div class="mt-1 text-xs text-slate-500">Navigate</div>
            </div>
            <button id="closeDrawer" type="button" class="rounded-xl bg-white px-3 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300">Close</button>
          </div>

          <div class="mt-5 space-y-1">
            {% for item in nav_items %}
              <a href="{{ item.href }}"
                 class="block rounded-xl px-4 py-3 text-sm font-semibold
                        {% if nav_active == item.key %}
                          bg-gradient-to-r from-pink-200 to-sky-200 text-slate-900 ring-1 ring-white
                        {% else %}
                          text-slate-700 hover:bg-slate-50
                        {% endif %}">
                {{ item.label }}
              </a>
            {% endfor %}
          </div>

          <div class="mt-6">
            <button id="logoutDrawer" type="button" class="w-full rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-300">
              Logout
            </button>
          </div>
        </div>
      </div>

      <script>
        (function () {
          const menuBtn = document.getElementById('menuBtn');
          const overlay = document.getElementById('overlay');
          const drawer = document.getElementById('drawer');
          const closeDrawer = document.getElementById('closeDrawer');
          if (!menuBtn || !overlay || !drawer || !closeDrawer) return;

          function open() {
            overlay.classList.remove('hidden');
            drawer.classList.remove('hidden');
          }
          function close() {
            overlay.classList.add('hidden');
            drawer.classList.add('hidden');
          }

          menuBtn.addEventListener('click', open);
          closeDrawer.addEventListener('click', close);
          overlay.addEventListener('click', close);
        })();
      </script>
    </div>
  </body>
</html>
