{% extends "frontend/app_shell.html" %}

{% block content %}
  <div class="rounded-3xl bg-white/70 backdrop-blur border border-white shadow-sm p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">My To‑Dos</h1>
        <div class="mt-1 text-sm text-slate-600">Personal tasks</div>
      </div>
      <a href="/app/parent/" class="inline-flex items-center justify-center rounded-xl bg-white px-4 py-2 text-sm font-semibold text-slate-800 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-400">Home</a>
    </div>
  </div>

  <div class="mt-6 grid gap-6 lg:grid-cols-2">
    <section id="create" class="rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
      <div class="flex items-center justify-between gap-4">
        <h2 class="text-lg font-semibold">Create</h2>
      </div>

      <form id="todoCreateForm" class="mt-4 space-y-3">
        <div>
          <label for="todoText" class="block text-sm font-medium text-slate-700">New To‑Do</label>
          <input id="todoText" type="text" placeholder="Buy pencils"
            class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <button type="submit"
          class="w-full rounded-xl bg-indigo-600 px-4 py-2.5 font-semibold text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
          Add
        </button>
      </form>
    </section>

    <section class="rounded-3xl bg-white/80 backdrop-blur border border-white shadow-sm p-6">
      <div class="flex items-center justify-between gap-4">
        <h2 class="text-lg font-semibold">List</h2>
      </div>
      <div class="mt-4" id="manualTodos"></div>
    </section>
  </div>
{% endblock %}
